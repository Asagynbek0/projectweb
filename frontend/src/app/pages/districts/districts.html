<section class="districts-page">
  <h1>Almaty Districts</h1>

  <p *ngIf="isLoading">Loading stations...</p>
  <p *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="district-grid" *ngIf="!isLoading && districts.length > 0">
    <div class="district-card" *ngFor="let district of districts">
      <h2>{{ district.name }}</h2>
      <p><strong>AQI:</strong> {{ district.aqi }}</p>
      <p><strong>Status:</strong> {{ district.status }}</p>

      <button [routerLink]="['/districts', district.id]">
        View Details
      </button>
    </div>
  </div>
</section>
