<section class="auth-page">
  <div class="auth-shell">
    <div class="auth-info">
      <span class="auth-badge">Secure Access</span>
      <h1>Login to AirAlmaty</h1>
      <p>
        Access district monitoring, detailed environmental readings, and the
        city dashboard in one place.
      </p>
    </div>

    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Sign in to continue</p>

      <form #loginForm="ngForm" class="auth-form" (ngSubmit)="onSubmit(loginForm)" novalidate>
        <div class="form-group">
          <label for="login-username">Username</label>
          <input
            id="login-username"
            name="username"
            type="text"
            placeholder="Enter your username"
            [(ngModel)]="loginData.username"
            #username="ngModel"
            required
          />

          <small class="error-message" *ngIf="username.invalid && username.touched">
            Username is required.
          </small>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input
            id="login-password"
            name="password"
            type="password"
            placeholder="Enter your password"
            [(ngModel)]="loginData.password"
            #password="ngModel"
            required
            minlength="6"
          />

          <small class="error-message" *ngIf="password.errors?.['required'] && password.touched">
            Password is required.
          </small>

          <small class="error-message" *ngIf="password.errors?.['minlength'] && password.touched">
            Password must be at least 6 characters.
          </small>
        </div>

        <button type="submit" class="auth-btn">Login</button>
      </form>
    </div>
  </div>
</section>
