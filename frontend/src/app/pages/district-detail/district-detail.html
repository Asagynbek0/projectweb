<section>
  <a routerLink="/districts">← Back</a>

  <p *ngIf="isLoading">Loading...</p>
  <p *ngIf="errorMessage">{{ errorMessage }}</p>

  <div *ngIf="latestReading">
    <h1>{{ stationName }}</h1>
    <p><strong>AQI:</strong> {{ latestReading.aqi }}</p>
    <p><strong>PM2.5:</strong> {{ latestReading.pm25 ?? '—' }}</p>
    <p><strong>PM10:</strong> {{ latestReading.pm10 ?? '—' }}</p>
    <p><strong>NO2:</strong> {{ latestReading.no2 ?? '—' }}</p>
    <p><strong>CO:</strong> {{ latestReading.co ?? '—' }}</p>
  </div>
</section>
