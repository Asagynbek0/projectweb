<section class="detail-page">
  <a routerLink="/districts" class="back-link">← Back to Districts</a>

  <p *ngIf="isLoading" class="loading-text">Loading station details...</p>
  <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>

  <div *ngIf="latestReading" class="detail-card">
    <div class="detail-header">
      <div>
        <span class="eyebrow">District Details</span>
        <h1>{{ stationName }}</h1>
      </div>

      <span
        class="status-pill"
        [class.good]="mapCategoryToStatus(latestReading.category) === 'Good'"
        [class.moderate]="mapCategoryToStatus(latestReading.category) === 'Moderate'"
        [class.unhealthy]="mapCategoryToStatus(latestReading.category) === 'Unhealthy'"
      >
        {{ mapCategoryToStatus(latestReading.category) }}
      </span>
    </div>

    <div class="aqi-box">
      <span class="aqi-label">Current AQI</span>
      <span class="aqi-value">{{ latestReading.aqi }}</span>
    </div>

    <div class="pollution-grid">
      <div class="pollution-card" *ngIf="latestReading.no2 !== null">
        <span class="pollution-name">NO2</span>
        <strong>{{ latestReading.no2 }}</strong>
      </div>

      <div class="pollution-card" *ngIf="latestReading.co !== null">
        <span class="pollution-name">CO</span>
        <strong>{{ latestReading.co }}</strong>
      </div>
    </div>
  </div>
</section>
